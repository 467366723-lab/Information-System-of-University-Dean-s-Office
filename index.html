<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Administration System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        h1 {
            background-color: #2c3e50;
            color: white;
            padding: 20px 30px;
            font-size: 24px;
        }

        .tabs {
            display: flex;
            background-color: #ecf0f1;
            border-bottom: 1px solid #ddd;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            color: #7f8c8d;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background-color: white;
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
        }

        .tab-content {
            padding: 30px;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-section {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 25px;
        }

        .form-section h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 150px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #34495e;
        }

        .form-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 14px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.3s;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2980b9;
        }

        .btn-warning {
            background-color: #f39c12;
            color: white;
        }

        .btn-warning:hover {
            background-color: #e67e22;
        }

        .btn-danger {
            background-color: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }

        th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
        }

        tr:hover {
            background-color: #f8f9fa;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .message {
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            display: block;
        }

        .query-section {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Educational Administration Management System</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('students')">Students</button>
            <button class="tab-btn" onclick="switchTab('courses')">Courses</button>
            <button class="tab-btn" onclick="switchTab('grades')">Grades</button>
        </div>

        <!-- Students Tab -->
        <div id="students" class="tab-content active">
            <div id="student-msg" class="message"></div>

            <div class="form-section">
                <h3>Add New Student</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Student ID</label>
                        <input type="text" id="stu-id" placeholder="e.g. S001">
                    </div>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="stu-name" placeholder="e.g. John Doe">
                    </div>
                    <div class="form-group">
                        <label>Grade</label>
                        <input type="number" id="stu-grade" placeholder="e.g. 1">
                    </div>
                    <div class="form-group">
                        <button class="btn btn-primary" onclick="addStudent()">Add Student</button>
                    </div>
                </div>
            </div>

            <h3>Student List</h3>
            <table>
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Name</th>
                        <th>Grade</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="student-table"></tbody>
            </table>
        </div>

        <!-- Courses Tab -->
        <div id="courses" class="tab-content">
            <div id="course-msg" class="message"></div>

            <div class="form-section">
                <h3>Add New Course</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Course ID</label>
                        <input type="text" id="course-id" placeholder="e.g. C001">
                    </div>
                    <div class="form-group">
                        <label>Course Name</label>
                        <input type="text" id="course-name" placeholder="e.g. Math">
                    </div>
                    <div class="form-group">
                        <label>Credits</label>
                        <input type="number" id="course-credits" placeholder="e.g. 4">
                    </div>
                    <div class="form-group">
                        <button class="btn btn-primary" onclick="addCourse()">Add Course</button>
                    </div>
                </div>
            </div>

            <h3>Course List</h3>
            <table>
                <thead>
                    <tr>
                        <th>Course ID</th>
                        <th>Course Name</th>
                        <th>Credits</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="course-table"></tbody>
            </table>
        </div>

        <!-- Grades Tab -->
        <div id="grades" class="tab-content">
            <div id="grade-msg" class="message"></div>

            <div class="form-section">
                <h3>Add New Grade Record</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Student ID</label>
                        <input type="text" id="grade-stu-id" placeholder="e.g. S001">
                    </div>
                    <div class="form-group">
                        <label>Course ID</label>
                        <input type="text" id="grade-course-id" placeholder="e.g. C001">
                    </div>
                    <div class="form-group">
                        <label>Score (0-100)</label>
                        <input type="number" id="grade-score" placeholder="e.g. 85">
                    </div>
                    <div class="form-group">
                        <button class="btn btn-primary" onclick="addGrade()">Add Grade</button>
                    </div>
                </div>
            </div>

            <div class="query-section">
                <div class="form-group">
                    <label>Query by Student ID</label>
                    <input type="text" id="query-stu-id" placeholder="Enter Student ID">
                </div>
                <button class="btn btn-primary" onclick="queryGradesByStudent()">Query</button>
                <button class="btn btn-warning" onclick="loadAllGrades()">Show All</button>
            </div>

            <h3>Grade List</h3>
            <table>
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Course ID</th>
                        <th>Score</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="grade-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'students') loadStudents();
            if (tabName === 'courses') loadCourses();
            if (tabName === 'grades') loadAllGrades();
        }

        // Show message
        function showMessage(elementId, text, type) {
            const el = document.getElementById(elementId);
            el.textContent = text;
            el.className = `message ${type}`;
            setTimeout(() => el.className = 'message', 3000);
        }

        // ==================== Student Module ====================
        async function loadStudents() {
            const res = await fetch(`${API_BASE}/students`);
            const data = await res.json();
            const tbody = document.getElementById('student-table');
            tbody.innerHTML = data.map(s => `
                <tr>
                    <td>${s.student_id}</td>
                    <td>${s.name}</td>
                    <td>${s.grade}</td>
                    <td class="action-buttons">
                        <button class="btn btn-warning" onclick="editStudent('${s.student_id}', '${s.name}', ${s.grade})">Edit</button>
                        <button class="btn btn-danger" onclick="deleteStudent('${s.student_id}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function addStudent() {
            const student_id = document.getElementById('stu-id').value.trim();
            const name = document.getElementById('stu-name').value.trim();
            const grade = parseInt(document.getElementById('stu-grade').value);

            if (!student_id || !name || !grade) {
                showMessage('student-msg', 'Please fill in all fields', 'error');
                return;
            }

            const res = await fetch(`${API_BASE}/students`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id, name, grade })
            });

            if (res.ok) {
                showMessage('student-msg', 'Student added successfully', 'success');
                document.getElementById('stu-id').value = '';
                document.getElementById('stu-name').value = '';
                document.getElementById('stu-grade').value = '';
                loadStudents();
            } else {
                const err = await res.json();
                showMessage('student-msg', err.error, 'error');
            }
        }

        function editStudent(id, name, grade) {
            const newName = prompt('Enter new name:', name);
            const newGrade = prompt('Enter new grade:', grade);
            if (newName === null || newGrade === null) return;

            updateStudent(id, newName, parseInt(newGrade));
        }

        async function updateStudent(id, name, grade) {
            const res = await fetch(`${API_BASE}/students/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, grade })
            });

            if (res.ok) {
                showMessage('student-msg', 'Student updated successfully', 'success');
                loadStudents();
            } else {
                const err = await res.json();
                showMessage('student-msg', err.error, 'error');
            }
        }

        async function deleteStudent(id) {
            if (!confirm('Are you sure you want to delete this student?')) return;

            const res = await fetch(`${API_BASE}/students/${id}`, { method: 'DELETE' });
            if (res.ok) {
                showMessage('student-msg', 'Student deleted successfully', 'success');
                loadStudents();
            } else {
                const err = await res.json();
                showMessage('student-msg', err.error, 'error');
            }
        }

        // ==================== Course Module ====================
        async function loadCourses() {
            const res = await fetch(`${API_BASE}/courses`);
            const data = await res.json();
            const tbody = document.getElementById('course-table');
            tbody.innerHTML = data.map(c => `
                <tr>
                    <td>${c.course_id}</td>
                    <td>${c.name}</td>
                    <td>${c.credits}</td>
                    <td class="action-buttons">
                        <button class="btn btn-warning" onclick="editCourse('${c.course_id}', '${c.name}', ${c.credits})">Edit</button>
                        <button class="btn btn-danger" onclick="deleteCourse('${c.course_id}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function addCourse() {
            const course_id = document.getElementById('course-id').value.trim();
            const name = document.getElementById('course-name').value.trim();
            const credits = parseInt(document.getElementById('course-credits').value);

            if (!course_id || !name || !credits) {
                showMessage('course-msg', 'Please fill in all fields', 'error');
                return;
            }

            const res = await fetch(`${API_BASE}/courses`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ course_id, name, credits })
            });

            if (res.ok) {
                showMessage('course-msg', 'Course added successfully', 'success');
                document.getElementById('course-id').value = '';
                document.getElementById('course-name').value = '';
                document.getElementById('course-credits').value = '';
                loadCourses();
            } else {
                const err = await res.json();
                showMessage('course-msg', err.error, 'error');
            }
        }

        function editCourse(id, name, credits) {
            const newName = prompt('Enter new course name:', name);
            const newCredits = prompt('Enter new credits:', credits);
            if (newName === null || newCredits === null) return;

            updateCourse(id, newName, parseInt(newCredits));
        }

        async function updateCourse(id, name, credits) {
            const res = await fetch(`${API_BASE}/courses/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, credits })
            });

            if (res.ok) {
                showMessage('course-msg', 'Course updated successfully', 'success');
                loadCourses();
            } else {
                const err = await res.json();
                showMessage('course-msg', err.error, 'error');
            }
        }

        async function deleteCourse(id) {
            if (!confirm('Are you sure you want to delete this course?')) return;

            const res = await fetch(`${API_BASE}/courses/${id}`, { method: 'DELETE' });
            if (res.ok) {
                showMessage('course-msg', 'Course deleted successfully', 'success');
                loadCourses();
            } else {
                const err = await res.json();
                showMessage('course-msg', err.error, 'error');
            }
        }

        // ==================== Grade Module ====================
        async function loadAllGrades() {
            const res = await fetch(`${API_BASE}/grades`);
            const data = await res.json();
            renderGradeTable(data);
        }

        async function queryGradesByStudent() {
            const stuId = document.getElementById('query-stu-id').value.trim();
            if (!stuId) {
                showMessage('grade-msg', 'Please enter student ID', 'error');
                return;
            }

            const res = await fetch(`${API_BASE}/grades/student/${stuId}`);
            const data = await res.json();
            renderGradeTable(data);
        }

        function renderGradeTable(data) {
            const tbody = document.getElementById('grade-table');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#999;">No records found</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(g => `
                <tr>
                    <td>${g.student_id}</td>
                    <td>${g.course_id}</td>
                    <td>${g.score}</td>
                    <td class="action-buttons">
                        <button class="btn btn-warning" onclick="editGrade('${g.student_id}', '${g.course_id}', ${g.score})">Edit</button>
                        <button class="btn btn-danger" onclick="deleteGrade('${g.student_id}', '${g.course_id}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function addGrade() {
            const student_id = document.getElementById('grade-stu-id').value.trim();
            const course_id = document.getElementById('grade-course-id').value.trim();
            const score = parseInt(document.getElementById('grade-score').value);

            if (!student_id || !course_id || isNaN(score)) {
                showMessage('grade-msg', 'Please fill in all fields', 'error');
                return;
            }

            const res = await fetch(`${API_BASE}/grades`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id, course_id, score })
            });

            if (res.ok) {
                showMessage('grade-msg', 'Grade added successfully', 'success');
                document.getElementById('grade-stu-id').value = '';
                document.getElementById('grade-course-id').value = '';
                document.getElementById('grade-score').value = '';
                loadAllGrades();
            } else {
                const err = await res.json();
                showMessage('grade-msg', err.error, 'error');
            }
        }

        function editGrade(stuId, courseId, score) {
            const newScore = prompt('Enter new score (0-100):', score);
            if (newScore === null) return;
            updateGrade(stuId, courseId, parseInt(newScore));
        }

        async function updateGrade(stuId, courseId, score) {
            const res = await fetch(`${API_BASE}/grades/${stuId}/${courseId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ score })
            });

            if (res.ok) {
                showMessage('grade-msg', 'Grade updated successfully', 'success');
                loadAllGrades();
            } else {
                const err = await res.json();
                showMessage('grade-msg', err.error, 'error');
            }
        }

        async function deleteGrade(stuId, courseId) {
            if (!confirm('Are you sure you want to delete this grade record?')) return;

            const res = await fetch(`${API_BASE}/grades/${stuId}/${courseId}`, { method: 'DELETE' });
            if (res.ok) {
                showMessage('grade-msg', 'Grade deleted successfully', 'success');
                loadAllGrades();
            } else {
                const err = await res.json();
                showMessage('grade-msg', err.error, 'error');
            }
        }

        // Initialize: load student list on page load
        window.onload = loadStudents;
    </script>
</body>
</html>
